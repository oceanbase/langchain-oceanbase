name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop
      - 'release/**'
      - 'hotfix/**'
  workflow_dispatch:

jobs:
  lint:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.3
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.12-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: |
          poetry install --with lint,typing --no-interaction --no-root

      - name: Run lint checks
        run: |
          poetry run ruff check langchain_oceanbase/
          poetry run ruff format langchain_oceanbase/ --check
          poetry run mypy langchain_oceanbase/ --cache-dir .mypy_cache || true

  test:
    name: Test Suite (${{ matrix.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: embedded-seekdb
            db-type: embedded-seekdb
            port: ""
            user: ""
            image: ""
            mode: ""
            runs-comprehensive: false
            upgrade-latest-checkpoint-stack: false
            integration-target: tests/integration_tests/test_checkpointer.py tests/integration_tests/test_checkpointer_embedded_seekdb.py tests/integration_tests/test_checkpoint_conformance.py
          - name: oceanbase
            db-type: oceanbase
            port: 2881
            user: root@test
            image: oceanbase/oceanbase-ce:4.3.5-lts
            mode: mini
            runs-comprehensive: true
            upgrade-latest-checkpoint-stack: false
            integration-target: tests/integration_tests/test_checkpointer.py tests/integration_tests/test_checkpoint_conformance.py
          - name: seekdb
            db-type: seekdb
            port: 2882
            user: root
            image: oceanbase/seekdb
            mode: mini
            runs-comprehensive: true
            upgrade-latest-checkpoint-stack: false
            integration-target: tests/integration_tests/test_checkpointer.py tests/integration_tests/test_checkpoint_conformance.py
          - name: embedded-seekdb, latest-checkpoint-stack
            db-type: embedded-seekdb
            port: ""
            user: ""
            image: ""
            mode: ""
            runs-comprehensive: false
            upgrade-latest-checkpoint-stack: true
            integration-target: tests/integration_tests/test_checkpointer.py tests/integration_tests/test_checkpointer_embedded_seekdb.py tests/integration_tests/test_checkpoint_conformance.py
          - name: oceanbase, latest-checkpoint-stack
            db-type: oceanbase
            port: 2881
            user: root@test
            image: oceanbase/oceanbase-ce:4.3.5-lts
            mode: mini
            runs-comprehensive: false
            upgrade-latest-checkpoint-stack: true
            integration-target: tests/integration_tests/test_checkpointer.py tests/integration_tests/test_checkpoint_conformance.py
          - name: seekdb, latest-checkpoint-stack
            db-type: seekdb
            port: 2882
            user: root
            image: oceanbase/seekdb
            mode: mini
            runs-comprehensive: false
            upgrade-latest-checkpoint-stack: true
            integration-target: tests/integration_tests/test_checkpointer.py tests/integration_tests/test_checkpoint_conformance.py

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.3
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.12-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: |
          poetry install --with test,test_integration --no-interaction

      - name: Upgrade to latest supported checkpoint stack
        if: matrix.upgrade-latest-checkpoint-stack
        run: |
          set -e
          poetry run python -m pip install --upgrade --upgrade-strategy eager \
            "langgraph>=1.0,<2.0" \
            "langgraph-checkpoint>=4.0,<5.0" \
            "langchain-core>=1.0,<2.0" \
            "pytest>=8,<10" \
            "pytest-asyncio>=1.3,<2"

      - name: Start ${{ matrix.db-type }} container
        if: matrix.image != ''
        run: |
          set -e
          echo "Starting ${{ matrix.db-type }} container..."
          docker run -d --name "langchain_${{ matrix.db-type }}_test" \
            -e MODE=${{ matrix.mode }} \
            -p ${{ matrix.port }}:2881 \
            ${{ matrix.image }}
          echo "${{ matrix.db-type }} container started"

      # OceanBase: wait for "boot success!"
      - name: Wait for OceanBase to be ready (boot success)
        if: matrix.db-type == 'oceanbase'
        run: |
          set -e
          echo "Waiting for oceanbase to be ready (log contains 'boot success!')..."
          timeout=300  # 5 minutes
          interval=5

          while [ $timeout -gt 0 ]; do
            if ! docker ps | grep -q "langchain_oceanbase_test"; then
              echo "OceanBase container stopped unexpectedly."
              docker logs "langchain_oceanbase_test" || true
              exit 1
            fi

            if docker logs "langchain_oceanbase_test" 2>&1 | grep -q "boot success!"; then
              echo "boot success! detected, OceanBase should be ready."
              break
            fi

            sleep $interval
            timeout=$((timeout - interval))
          done

          if [ $timeout -le 0 ]; then
            echo "OceanBase did not become ready in time."
            docker logs "langchain_oceanbase_test" || true
            exit 1
          fi

      # SeekDB: wait until port is connectable
      - name: Wait for SeekDB to be ready (port check)
        if: matrix.db-type == 'seekdb'
        run: |
          set -e
          echo "Waiting for seekdb to be ready (port ${{ matrix.port }} connectable)..."
          timeout=300  # 5 minutes
          interval=5

          while [ $timeout -gt 0 ]; do
            if ! docker ps | grep -q "langchain_seekdb_test"; then
              echo "SeekDB container stopped unexpectedly."
              docker logs "langchain_seekdb_test" || true
              exit 1
            fi

            # Try TCP connect to the mapped port
            if timeout 5 bash -c "echo > /dev/tcp/127.0.0.1/${{ matrix.port }}" 2>/dev/null; then
              echo "SeekDB port ${{ matrix.port }} is open, SeekDB should be ready."
              break
            fi

            sleep $interval
            timeout=$((timeout - interval))
          done

          if [ $timeout -le 0 ]; then
            echo "SeekDB did not become ready in time."
            docker logs "langchain_seekdb_test" || true
            exit 1
          fi

      - name: Report LangGraph dependency versions
        run: |
          set -e
          poetry run python - <<'PY'
          import importlib.metadata as md
          for name in ("langgraph", "langgraph-checkpoint", "langchain-core", "pytest", "pytest-asyncio", "langsmith", "pydantic"):
              print(f"{name}={md.version(name)}")
          PY

      - name: Run checkpoint unit tests
        run: |
          set -e
          poetry run pytest \
            tests/unit_tests/test_checkpointer_async_api.py \
            tests/unit_tests/test_legacy_checkpoint_saver.py \
            -v

      - name: Run comprehensive tests
        if: matrix.runs-comprehensive
        env:
          OB_HOST: 127.0.0.1
          OB_PORT: ${{ matrix.port }}
          OB_USER: ${{ matrix.user }}
          OB_PASSWORD: ""
          OB_DB: test
          OB_CI_DB_TYPE: ${{ matrix.db-type }}
        run: |
          set -e
          echo "Running comprehensive tests with ${{ matrix.db-type }}..."
          poetry run python tests/test_comprehensive.py

      - name: Run integration tests
        env:
          OB_HOST: 127.0.0.1
          OB_PORT: ${{ matrix.port }}
          OB_USER: ${{ matrix.user }}
          OB_PASSWORD: ""
          OB_DB: test
          OB_CI_DB_TYPE: ${{ matrix.db-type }}
        run: |
          set -euo pipefail
          report_path="${RUNNER_TEMP}/integration-${{ matrix.db-type }}.xml"
          echo "Running integration tests with ${{ matrix.db-type }}..."
          poetry run pytest ${{ matrix.integration-target }} -v --junitxml="$report_path"
          python - "$report_path" <<'PY'
          import sys
          import xml.etree.ElementTree as ET

          report_path = sys.argv[1]
          root = ET.parse(report_path).getroot()
          suites = [root] if root.tag == "testsuite" else root.findall("testsuite")
          failures = sum(int(suite.attrib.get("failures", 0)) for suite in suites)
          errors = sum(int(suite.attrib.get("errors", 0)) for suite in suites)
          skipped = sum(int(suite.attrib.get("skipped", 0)) for suite in suites)
          tests = sum(int(suite.attrib.get("tests", 0)) for suite in suites)
          print(
              f"JUnit summary: tests={tests} failures={failures} errors={errors} skipped={skipped}"
          )
          if failures or errors:
              raise SystemExit(1)
          PY

      - name: Cleanup
        if: always()
        run: |
          if [ -n "${{ matrix.image }}" ]; then
            docker rm -f "langchain_${{ matrix.db-type }}_test" || true
          fi

  test-embedding:
    name: Embedding Vectorization Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.3
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Load cached venv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-3.12-${{ hashFiles('**/poetry.lock') }}

      - name: Install dependencies
        run: |
          poetry install --with test --no-interaction --no-root

      - name: Test embedding functionality
        run: |
          poetry run python -c "
          from langchain_oceanbase.embedding_utils import DefaultEmbeddingFunctionAdapter
          adapter = DefaultEmbeddingFunctionAdapter()
          embeddings = adapter.embed_documents(['test document'])
          print(f'Embedding test passed: {len(embeddings[0])} dimensions')
          "

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [lint, test, test-embedding]
    if: always()

    steps:
      - name: Test Summary
        run: |
          echo "All jobs finished."
          echo "Lint:            ${{ needs.lint.result }}"
          echo "DB test matrix:  ${{ needs.test.result }}"
          echo "Embedding tests: ${{ needs.test-embedding.result }}"
